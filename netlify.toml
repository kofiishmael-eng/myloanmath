# Netlify site configuration for myloanmath.com

[build]
  publish = "."

# Security headers — applied to every page
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long-term caching for static assets that only change when re-uploaded
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/numberToWords.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/finance.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Custom 404 page (Netlify serves this automatically for any unmatched path)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
